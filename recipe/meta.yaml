{% set name = "sphericart" %}
{% set version = "1.0.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  - url: https://github.com/lab-cosmo/sphericart/archive/v{{ version }}.tar.gz
    sha256: 327f6617c529f5b7dab66b352aa2bfc653b627c95feaf1626b041fae4aabe959

build:
  number: 2
  # Secondary Linux arches are enabled for CPU builds first.
  skip: true  # [cuda_compiler_version != "None" and (ppc64le or aarch64 or win)]
  skip: true  # [cuda_compiler_version == "11.8"]

requirements:
  build:
    - {{ compiler("c") }}
    - {{ compiler("cxx") }}
    - {{ stdlib("c") }}
    - cmake
    - cross-python_{{ target_platform }}  # [build_platform != target_platform]
    - libgomp      # [linux]
    - llvm-openmp  # [osx]
    - make         # [unix]
    - ninja
    - pip         # [build_platform != target_platform]
    - pybind11    # [build_platform != target_platform]
    - python      # [build_platform != target_platform]
    - setuptools  # [build_platform != target_platform]
    {% if cuda_compiler_version != "None" %}
    - {{ compiler("cuda") }}
    - cuda-nvcc
    - cuda-toolkit
    {% endif %}
  host:
    - libgomp      # [linux]
    - llvm-openmp  # [osx]
    - pip
    - python
    - setuptools
    - vcomp14      # [win]
    {% if cuda_compiler_version != "None" %}
    - {{ compiler("cuda") }}
    - cuda-nvcc
    - cuda-toolkit
    {% endif %}
  run:
    - numpy
    - python
    - vcomp14  # [win]

test:
  files:
    - run_test.py
  imports:
    - sphericart
  commands:
    - pip check
    - python run_test.py
  requires:
    - pip

outputs:
  - name: sphericart
  - name: sphericart-torch
    script: build_torch.sh  # [unix]
    build:
      # Cross-building PyTorch extensions links against build-platform
      # libtorch, so keep the torch output on native platforms only.
      skip: true  # [ppc64le or aarch64]
      # Current PyTorch pins make the torch output non-final on osx-arm64.
      # Keep the base sphericart output enabled there.
      skip: true  # [osx and arm64]
      skip: true  # [win]
      # PyTorch does not provide Python 3.14 builds yet. Keep the base
      # sphericart output enabled for py314 and skip only the torch output.
      skip: true  # [py>=314]
    requirements:
      build:
        - {{ compiler("c") }}
        - {{ compiler("cxx") }}
        - {{ stdlib("c") }}
        - cmake
        - cross-python_{{ target_platform }}  # [build_platform != target_platform]
        - libgomp      # [linux]
        - llvm-openmp  # [osx]
        - make         # [unix]
        - ninja
        - pip         # [build_platform != target_platform]
        - pybind11    # [build_platform != target_platform]
        - python      # [build_platform != target_platform]
        - pytorch     # [build_platform != target_platform]
        - setuptools  # [build_platform != target_platform]
        {% if cuda_compiler_version != "None" %}
        - {{ compiler("cuda") }}
        - cuda-nvcc
        - cuda-toolkit
        {% endif %}
      host:
        - libgomp      # [linux]
        - llvm-openmp  # [osx]
        - pip
        - python
        - pytorch
        - setuptools
        {% if cuda_compiler_version != "None" %}
        - cuda-version {{ cuda_compiler_version }}
        - cuda-nvcc
        - cuda-toolkit
        {% endif %}
      run:
        - {{ pin_subpackage("sphericart", exact=True) }}
        - numpy
        - python
        - pytorch
    test:
      files:
        - run_test_torch.py
      imports:
        - sphericart.torch
      commands:
        - pip check
        - python run_test_torch.py
      requires:
        - pip

about:
  home: https://github.com/lab-cosmo/sphericart
  summary: Multi-language library for the calculation of spherical harmonics in Cartesian coordinates
  license: MIT
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - jeongseok-meta
